# Sentinel Phase 0 — Daily Picks
#
# Runs the full ingestion + model + signal pipeline once per day and writes
# today's value-bet picks to the job summary.
#
# Schedule: 12:00 UTC = 09:00 ART (Argentina). This is before most MLB day
# games begin (~18:00 UTC), so picks are available with plenty of lead time.

name: Daily Picks

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:    # manual trigger, no inputs needed

# Opt into the Node.js 24 runtime used by GitHub-hosted actions.
# Suppresses the deprecation warning emitted when actions still ship a
# node20 entry-point but the runner supports node24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  picks:
    name: Generate picks
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # Setup                                                               #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ------------------------------------------------------------------ #
      # Pre-flight checks                                                   #
      # ------------------------------------------------------------------ #
      - name: Validate secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL secret is not set."
            echo "Go to: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi
          if [ -z "$ODDS_API_KEY" ]; then
            echo "ERROR: ODDS_API_KEY secret is not set."
            exit 1
          fi
          echo "Secrets present — proceeding."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      # ------------------------------------------------------------------ #
      # Pipeline run                                                        #
      # ------------------------------------------------------------------ #
      - name: Run pipeline (ingest -> model -> signals)
        id: pipeline
        run: |
          python -m scripts.paper_trade --notify 2>&1 | tee /tmp/picks_output.txt
          # Propagate non-zero exit codes even through tee.
          exit ${PIPESTATUS[0]}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # ------------------------------------------------------------------ #
      # Job summary                                                         #
      # ------------------------------------------------------------------ #
      - name: Write job summary
        if: always()
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          {
            echo "## Sentinel Picks — ${TODAY}"
            echo ""
            # Count signal lines: lines that start with "    Pick:"
            SIGNAL_COUNT=$(grep -c "Pick:" /tmp/picks_output.txt 2>/dev/null || echo 0)
            echo "**Signals generated: ${SIGNAL_COUNT}**"
            echo ""
            echo '```'
            cat /tmp/picks_output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
